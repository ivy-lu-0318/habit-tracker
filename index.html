<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>習慣追蹤</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#C8BEB2">
<style>
:root{
  --bg:#F5F1EA;
  --surface:#FFFFFF;
  --card:#EDE6DD;
  --text:#5A524A;
  --text-light:#9C9388;
  --border:#E1D8CB;
  --accent:#B8AFA3;
  --rose:#C9A9A6;
  --sage:#A3AC9B;
  --dusk:#9FAAB4;
  --danger:#C08883;
  --success:#8FA089;
  --shadow:0 2px 10px rgba(90,82,74,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:64px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 18px 8px;
}
.date-label{font-size:15px;color:var(--text-light);}
.icon-btn{
  background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);
  padding:6px;line-height:1;
}
main{flex:1;padding:0 16px 24px;}
.page{display:none;}
.page.active{display:block;}

/* mood strip */
.mood-strip{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border-radius:16px;padding:12px 14px;
  box-shadow:var(--shadow);margin-bottom:16px;
}
.mood-strip .mood-emojis{display:flex;gap:4px;flex:1;}
.mood-emojis button{
  background:none;border:none;font-size:22px;cursor:pointer;border-radius:10px;
  padding:4px 6px;opacity:0.45;transition:opacity .15s, transform .15s;
}
.mood-emojis button.selected{opacity:1;transform:scale(1.15);background:var(--card);}
.mood-note-btn{font-size:12px;color:var(--text-light);background:var(--card);border:none;border-radius:10px;padding:6px 10px;cursor:pointer;}

/* habit cards */
.habit-card{
  background:var(--surface);border-radius:16px;padding:14px 16px;margin-bottom:12px;
  box-shadow:var(--shadow);
}
.habit-card-top{display:flex;align-items:center;justify-content:space-between;}
.habit-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;}
.habit-title .emoji{font-size:20px;}
.streak-badge{font-size:12px;color:var(--text-light);background:var(--card);border-radius:10px;padding:3px 8px;white-space:nowrap;}
.habit-edit-btn{background:none;border:none;color:var(--text-light);font-size:14px;cursor:pointer;padding:4px;}
.habit-progress-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.habit-progress-text{font-size:13px;color:var(--text-light);}
.habit-actions{display:flex;gap:6px;}
.habit-actions button{
  border:none;border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;
  background:var(--card);color:var(--text);
}
.habit-actions button.primary{background:var(--sage);color:#fff;}
.habit-actions button.minus{background:var(--bg);color:var(--text-light);}
.progress-bar-bg{height:6px;border-radius:3px;background:var(--card);margin-top:8px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--sage);transition:width .2s;}
.negative-card.success{background:#F2F5EF;}
.negative-card.broken{background:#F7EDEC;}
.negative-toggle{
  width:100%;margin-top:10px;border:none;border-radius:12px;padding:10px;font-size:14px;cursor:pointer;
}
.negative-toggle.is-success{background:var(--success);color:#fff;}
.negative-toggle.is-broken{background:var(--danger);color:#fff;}
.boolean-toggle{
  width:100%;margin-top:10px;border:none;border-radius:12px;padding:10px;font-size:14px;cursor:pointer;background:var(--card);color:var(--text);
}
.boolean-toggle.done{background:var(--success);color:#fff;}
.empty-hint{text-align:center;color:var(--text-light);font-size:13px;padding:30px 10px;}

.fab{
  display:block;width:100%;margin-top:6px;padding:13px;border-radius:14px;border:1px dashed var(--accent);
  background:none;color:var(--text-light);font-size:14px;cursor:pointer;
}

/* bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  display:flex;background:var(--surface);border-top:1px solid var(--border);
}
.bottom-nav button{
  flex:1;border:none;background:none;padding:10px 0 8px;font-size:11px;color:var(--text-light);cursor:pointer;
}
.bottom-nav button.active{color:var(--text);font-weight:600;}
.bottom-nav .nav-icon{display:block;font-size:18px;margin-bottom:2px;}

/* stats page */
.stats-header{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;}
.stats-header button{background:none;border:none;font-size:20px;color:var(--text-light);cursor:pointer;}
.stats-header span{font-size:15px;font-weight:600;}
.calendar{
  display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--surface);
  border-radius:16px;padding:14px 10px;box-shadow:var(--shadow);
}
.cal-dow{text-align:center;font-size:11px;color:var(--text-light);padding-bottom:4px;}
.cal-day{
  aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;color:var(--text);position:relative;
}
.cal-day .num{font-size:11px;}
.cal-day .mood-emoji{font-size:9px;line-height:1;margin-top:1px;}
.cal-day.empty{visibility:hidden;}
.section-card{
  background:var(--surface);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-top:16px;
}
.section-title{font-size:14px;font-weight:600;margin-bottom:10px;}
.best-streak-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid var(--border);}
.best-streak-row:last-child{border-bottom:none;}
.best-streak-row .flame{color:var(--rose);font-weight:600;}
.habit-grid-block{margin-bottom:18px;}
.habit-grid-block:last-child{margin-bottom:0;}
.habit-grid-title{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.grid-squares{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;}
.grid-square{aspect-ratio:1;border-radius:2px;background:var(--card);}

/* report page */
.period-tabs{display:flex;gap:8px;margin:14px 0;}
.period-tabs button{
  flex:1;border:none;border-radius:12px;padding:9px 0;font-size:13px;background:var(--card);color:var(--text-light);cursor:pointer;
}
.period-tabs button.active{background:var(--dusk);color:#fff;}
.report-rate-big{font-size:36px;font-weight:700;text-align:center;margin:6px 0 2px;}
.report-rate-label{text-align:center;font-size:12px;color:var(--text-light);}
.rank-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.rank-row:last-child{border-bottom:none;}
.rank-row .rank-name{display:flex;align-items:center;gap:6px;}
.rank-rate{font-weight:600;}
.rank-rate.low{color:var(--danger);}
.rank-rate.high{color:var(--success);}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(90,82,74,0.35);display:flex;align-items:flex-end;
  z-index:100;
}
.modal-overlay.hidden{display:none;}
.modal-sheet{
  background:var(--bg);width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:12px;color:var(--text-light);margin-bottom:5px;}
.form-row input[type=text],.form-row input[type=number],.form-row select{
  width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
  font-size:14px;color:var(--text);
}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-size:13px;background:var(--surface);
  cursor:pointer;color:var(--text-light);
}
.chip.selected{background:var(--sage);color:#fff;border-color:var(--sage);}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;}
.emoji-grid button{font-size:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 9px;cursor:pointer;}
.emoji-grid button.selected{background:var(--card);border-color:var(--accent);}
.day-chips{display:flex;gap:5px;}
.day-chips button{
  flex:1;border:1px solid var(--border);border-radius:10px;padding:8px 0;font-size:12px;background:var(--surface);
  color:var(--text-light);cursor:pointer;
}
.day-chips button.selected{background:var(--dusk);color:#fff;border-color:var(--dusk);}
.modal-btn-row{display:flex;gap:10px;margin-top:18px;}
.modal-btn-row button{
  flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;cursor:pointer;
}
.btn-secondary{background:var(--card);color:var(--text);}
.btn-primary{background:var(--sage);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}

/* timer modal */
.timer-modal{align-items:center;justify-content:center;}
.timer-sheet{
  background:var(--surface);border-radius:24px;padding:30px 26px;width:86%;max-width:340px;text-align:center;
}
.timer-circle{
  width:200px;height:200px;border-radius:50%;margin:16px auto;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--dusk) calc(var(--pct,0)*1%), var(--card) 0);position:relative;
}
.timer-circle::before{
  content:'';position:absolute;inset:10px;border-radius:50%;background:var(--surface);
}
.timer-time{position:relative;font-size:32px;font-weight:700;z-index:1;}
.timer-hint{font-size:12px;color:var(--text-light);margin-top:6px;}

/* settings modal habit list */
.settings-habit-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.settings-habit-row:last-child{border-bottom:none;}
.settings-habit-row .left{display:flex;align-items:center;gap:8px;}
.settings-habit-row button{background:var(--card);border:none;border-radius:8px;padding:5px 9px;font-size:12px;color:var(--text-light);cursor:pointer;margin-left:6px;}
.backup-row{display:flex;gap:10px;margin-top:10px;}
.backup-row button{flex:1;border:none;border-radius:12px;padding:11px;font-size:13px;background:var(--card);color:var(--text);cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="date-label" id="dateLabel"></div>
    <button class="icon-btn" id="settingsBtn">⚙️</button>
  </header>

  <main>
    <section id="page-home" class="page active">
      <div class="mood-strip">
        <div class="mood-emojis" id="moodEmojis"></div>
        <button class="mood-note-btn" id="moodNoteBtn">備註</button>
      </div>
      <div class="habit-list" id="habitList"></div>
      <button class="fab" id="addHabitBtn">＋ 新增習慣</button>
    </section>

    <section id="page-stats" class="page">
      <div class="stats-header">
        <button id="monthPrev">‹</button>
        <span id="monthLabel"></span>
        <button id="monthNext">›</button>
      </div>
      <div class="calendar" id="calendarGrid"></div>
      <div class="section-card">
        <div class="section-title">最佳連續紀錄</div>
        <div id="bestStreaks"></div>
      </div>
      <div class="section-card">
        <div class="section-title">個別習慣紀錄（近 70 天）</div>
        <div id="habitGrids"></div>
      </div>
    </section>

    <section id="page-report" class="page">
      <div class="period-tabs">
        <button data-period="week" class="active">週報表</button>
        <button data-period="month">月報表</button>
        <button data-period="year">年報表</button>
      </div>
      <div class="section-card">
        <div class="report-rate-big" id="reportRateBig">--%</div>
        <div class="report-rate-label" id="reportRateLabel">整體打卡率</div>
      </div>
      <div class="section-card">
        <div class="section-title">習慣排行（由低到高）</div>
        <div id="reportRanking"></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button data-page="home" class="active"><span class="nav-icon">🏠</span>主頁</button>
    <button data-page="stats"><span class="nav-icon">📅</span>統計</button>
    <button data-page="report"><span class="nav-icon">📊</span>報表</button>
  </nav>
</div>

<div class="modal-overlay hidden" id="habitModal">
  <div class="modal-sheet">
    <div class="modal-title" id="habitModalTitle">新增習慣</div>
    <div class="form-row">
      <label>名稱</label>
      <input type="text" id="habitName" placeholder="例如：運動">
    </div>
    <div class="form-row">
      <label>圖示</label>
      <div class="emoji-grid" id="habitEmojiGrid"></div>
    </div>
    <div class="form-row">
      <label>型態</label>
      <div class="chip-row" id="habitTypeChips">
        <div class="chip" data-type="count">次數型</div>
        <div class="chip" data-type="duration">時長型（累計）</div>
        <div class="chip" data-type="timer">時長型（倒數計時）</div>
        <div class="chip" data-type="quantity">數值型</div>
        <div class="chip" data-type="boolean">打勾型</div>
        <div class="chip" data-type="negative">戒除型</div>
      </div>
    </div>
    <div class="form-row" id="targetRow">
      <label id="targetLabel">目標值</label>
      <input type="number" id="habitTarget" min="1" value="1">
    </div>
    <div class="form-row" id="unitRow">
      <label>單位</label>
      <input type="text" id="habitUnit" placeholder="例如：分鐘 / ml / 次">
    </div>
    <div class="form-row">
      <label>頻率</label>
      <div class="chip-row" id="habitFreqChips">
        <div class="chip" data-freq="daily">每天</div>
        <div class="chip" data-freq="weekly_days">每週特定幾天</div>
        <div class="chip" data-freq="weekly_count">每週次數（不限日期）</div>
      </div>
    </div>
    <div class="form-row" id="weeklyDaysRow" style="display:none;">
      <label>選擇星期</label>
      <div class="day-chips" id="dayChips">
        <button data-day="1">一</button><button data-day="2">二</button><button data-day="3">三</button>
        <button data-day="4">四</button><button data-day="5">五</button><button data-day="6">六</button>
        <button data-day="0">日</button>
      </div>
    </div>
    <div class="form-row" id="weeklyCountRow" style="display:none;">
      <label>每週需完成幾天</label>
      <input type="number" id="habitWeeklyCount" min="1" value="3">
    </div>
    <div class="modal-btn-row">
      <button class="btn-secondary" id="habitCancelBtn">取消</button>
      <button class="btn-primary" id="habitSaveBtn">儲存</button>
    </div>
  </div>
</div>

<div class="modal-overlay timer-modal hidden" id="timerModal">
  <div class="timer-sheet">
    <div id="timerHabitName" style="font-size:15px;font-weight:600;"></div>
    <div class="timer-circle" id="timerCircle" style="--pct:0;">
      <div class="timer-time" id="timerTime">10:00</div>
    </div>
    <div class="timer-hint">建議保持螢幕開啟，才能準時聽到提示音</div>
    <div class="modal-btn-row">
      <button class="btn-secondary" id="timerCancelBtn">取消</button>
      <button class="btn-primary" id="timerStartBtn">開始</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="moodModal">
  <div class="modal-sheet">
    <div class="modal-title">今天的心情備註</div>
    <div class="form-row">
      <textarea id="moodNoteText" rows="4" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);font-size:14px;" placeholder="想寫點什麼嗎？"></textarea>
    </div>
    <div class="modal-btn-row">
      <button class="btn-secondary" id="moodNoteCancelBtn">取消</button>
      <button class="btn-primary" id="moodNoteSaveBtn">儲存</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal-sheet">
    <div class="modal-title">設定</div>
    <div class="section-title">習慣管理</div>
    <div id="settingsHabitList"></div>
    <div class="section-title" style="margin-top:18px;">資料備份</div>
    <div class="backup-row">
      <button id="exportBtn">匯出備份 JSON</button>
      <button id="importBtn">匯入還原</button>
    </div>
    <input type="file" id="importFileInput" accept="application/json" style="display:none;">
    <div class="modal-btn-row">
      <button class="btn-secondary" id="settingsCloseBtn">關閉</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'habitTrackerData_v1';
const HABIT_ICONS = ['🏃','🧘','💧','🚽','💊','🍬','📖','😴','🚭','🍺','🧹','✍️','🎯','🌱','🐱'];

function uid(){ return 'h_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

function defaultHabits(){
  const t = todayStr();
  return [
    {id:uid(),name:'運動',icon:'🏃',type:'duration',target:30,unit:'分鐘',frequency:{type:'daily'},order:0,archived:false,createdAt:t},
    {id:uid(),name:'冥想',icon:'🧘',type:'timer',target:10,unit:'分鐘',frequency:{type:'daily'},order:1,archived:false,createdAt:t},
    {id:uid(),name:'飲水',icon:'💧',type:'quantity',target:2000,unit:'ml',frequency:{type:'daily'},order:2,archived:false,createdAt:t},
    {id:uid(),name:'上廁所',icon:'🚽',type:'count',target:5,unit:'次',frequency:{type:'daily'},order:3,archived:false,createdAt:t},
    {id:uid(),name:'保健食品',icon:'💊',type:'boolean',target:1,unit:'',frequency:{type:'daily'},order:4,archived:false,createdAt:t},
    {id:uid(),name:'戒零食',icon:'🍬',type:'negative',target:1,unit:'',frequency:{type:'daily'},order:5,archived:false,createdAt:t},
  ];
}

function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    const seeded = {habits: defaultHabits(), logs:{}, moods:{}};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
    return seeded;
  }
  try{
    const parsed = JSON.parse(raw);
    if(!parsed.habits) parsed.habits = [];
    if(!parsed.logs) parsed.logs = {};
    if(!parsed.moods) parsed.moods = {};
    return parsed;
  }catch(e){
    const seeded = {habits: defaultHabits(), logs:{}, moods:{}};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
    return seeded;
  }
}

let state = loadState();
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function pad2(n){ return n<10 ? '0'+n : ''+n; }
function dateStr(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function todayStr(){ return dateStr(new Date()); }
function parseDateStr(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d, n){ const nd = new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function weekdayOf(dstr){ return parseDateStr(dstr).getDay(); }

function mondayOfWeek(d){
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  return addDays(d, diff);
}

function isScheduledOnDate(habit, dstr){
  if(habit.createdAt && dstr < habit.createdAt) return false;
  const f = habit.frequency || {type:'daily'};
  if(f.type === 'daily') return true;
  if(f.type === 'weekly_days') return (f.days||[]).includes(weekdayOf(dstr));
  if(f.type === 'weekly_count') return true;
  return true;
}

function getLogValue(habit, dstr){
  const day = state.logs[dstr];
  if(!day) return undefined;
  return day[habit.id];
}

function setLogValue(habit, dstr, value){
  if(!state.logs[dstr]) state.logs[dstr] = {};
  state.logs[dstr][habit.id] = value;
  saveState();
}

function isDaySuccess(habit, dstr){
  const v = getLogValue(habit, dstr);
  switch(habit.type){
    case 'count':
    case 'duration':
    case 'timer':
    case 'quantity':
      return (v || 0) >= habit.target;
    case 'boolean':
      return v === true;
    case 'negative':
      return v !== true;
    default:
      return false;
  }
}

function habitProgressValue(habit, dstr){
  const v = getLogValue(habit, dstr);
  if(['count','duration','timer','quantity'].includes(habit.type)) return v || 0;
  return v;
}

function habitStartDate(habit){
  return habit.createdAt || todayStr();
}

function computeCurrentStreak(habit){
  const today = new Date();
  const todayS = dateStr(today);
  const startS = habitStartDate(habit);
  if(habit.frequency.type === 'weekly_count'){
    let week = mondayOfWeek(today);
    let streakWeeks = 0;
    let firstWeek = true;
    while(dateStr(addDays(week,6)) >= startS){
      const days = [];
      for(let i=0;i<7;i++) days.push(dateStr(addDays(week,i)));
      const relevantDays = (firstWeek ? days.filter(d => d <= todayS) : days).filter(d => d >= startS);
      const successCount = relevantDays.filter(d => isDaySuccess(habit,d)).length;
      const target = habit.frequency.count || 1;
      if(firstWeek){
        if(successCount >= target) streakWeeks++;
        firstWeek = false;
      } else {
        if(successCount >= target) streakWeeks++;
        else break;
      }
      week = addDays(week,-7);
      if(streakWeeks > 520) break;
    }
    return {value: streakWeeks, unit:'週'};
  }

  let cursor = new Date(today);
  let streak = 0;
  let first = true;
  while(dateStr(cursor) >= startS){
    const dstr = dateStr(cursor);
    if(isScheduledOnDate(habit, dstr)){
      const success = isDaySuccess(habit, dstr);
      if(first && dstr === todayS && !success){
        // today not completed yet, don't break streak, just skip today
      } else if(success){
        streak++;
      } else {
        break;
      }
    }
    first = false;
    cursor = addDays(cursor, -1);
  }
  return {value: streak, unit:'天'};
}

function computeBestStreak(habit){
  const startS = habitStartDate(habit);
  const last = todayStr();
  if(startS > last) return {value:0, unit: habit.frequency.type==='weekly_count'?'週':'天'};
  const first = startS;

  if(habit.frequency.type === 'weekly_count'){
    let week = mondayOfWeek(parseDateStr(first));
    const endWeek = mondayOfWeek(parseDateStr(last));
    let best = 0, cur = 0;
    while(dateStr(week) <= dateStr(endWeek)){
      const days = []; for(let i=0;i<7;i++) days.push(dateStr(addDays(week,i)));
      const relevantDays = days.filter(d => d >= startS);
      const successCount = relevantDays.filter(d => isDaySuccess(habit,d)).length;
      if(successCount >= (habit.frequency.count||1)){ cur++; best = Math.max(best,cur); } else cur = 0;
      week = addDays(week,7);
    }
    return {value:best, unit:'週'};
  }

  let cursor = parseDateStr(first);
  let best = 0, cur = 0;
  while(dateStr(cursor) <= last){
    const d = dateStr(cursor);
    if(isScheduledOnDate(habit,d)){
      if(isDaySuccess(habit,d)){ cur++; best = Math.max(best,cur); } else cur = 0;
    }
    cursor = addDays(cursor,1);
  }
  return {value:best, unit:'天'};
}

  if(habit.type === 'duration' || habit.type === 'timer') return `${v||0} / ${habit.target} 分鐘`;

        </button>
      `;
    } else if(habit.type === 'boolean'){
      const done = getLogValue(habit, t) === true;
      card.innerHTML = `
        <div class="habit-card-top">
          <div class="habit-title"><span class="emoji">${habit.icon}</span>${habit.name}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${streakLabel ? `<span class="streak-badge">${streakLabel}</span>` : ''}

      `;
    } else {
      const v = habitProgressValue(habit, t) || 0;
      const pct = Math.min(100, Math.round(v/habit.target*100));
      let step1 = 1, step2 = null;
      if(habit.type === 'duration'){ step1 = 5; step2 = 10; }
      if(habit.type === 'quantity'){ step1 = 250; step2 = 500; }
      card.innerHTML = `
        <div class="habit-card-top">
          <div class="habit-title"><span class="emoji">${habit.icon}</span>${habit.name}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${streakLabel ? `<span class="streak-badge">${streakLabel}</span>` : ''}

          </div>

let timerState = null;
function openTimer(habit){
  document.getElementById('timerHabitName').textContent = `${habit.icon} ${habit.name}（${habit.target} 分鐘）`;
  document.getElementById('timerTime').textContent = `${pad2(habit.target)}:00`;
  document.getElementById('timerCircle').style.setProperty('--pct', 0);
  document.getElementById('timerStartBtn').textContent = '開始';
  document.getElementById('timerStartBtn').disabled = false;
  timerState = {habit, startTime:null, durationMs: habit.target*60*1000, running:false, interval:null};
  openModal('timerModal');
}

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

function tickTimer(){
  if(!timerState || !timerState.running) return;
  const elapsed = Date.now() - timerState.startTime;
  const remainMs = Math.max(0, timerState.durationMs - elapsed);
  const remainSec = Math.ceil(remainMs/1000);
  const mm = Math.floor(remainSec/60), ss = remainSec%60;
  document.getElementById('timerTime').textContent = `${pad2(mm)}:${pad2(ss)}`;
  const pct = Math.min(100, Math.round(elapsed/timerState.durationMs*100));
  document.getElementById('timerCircle').style.setProperty('--pct', pct);
  if(remainMs <= 0){
    clearInterval(timerState.interval);
    const habit = timerState.habit;
    setLogValue(habit, todayStr(), habit.target);
    beep();
    renderHabitList();
    document.getElementById('timerStartBtn').textContent = '完成！';
    timerState.running = false;
    setTimeout(()=>closeModal('timerModal'), 900);
  }
}

document.getElementById('timerStartBtn').onclick = () => {
  if(!timerState || timerState.running) return;
  timerState.startTime = Date.now();
  timerState.running = true;
  timerState.interval = setInterval(tickTimer, 500);
  document.getElementById('timerStartBtn').textContent = '進行中…';
};
document.getElementById('timerCancelBtn').onclick = () => {
  if(timerState && timerState.interval) clearInterval(timerState.interval);
  closeModal('timerModal');
};

let calMonth = new Date();

function monthCompletionRate(dstr){
  const habits = activeHabits().filter(h => isScheduledOnDate(h, dstr));
  if(habits.length === 0) return null;
  const success = habits.filter(h => isDaySuccess(h, dstr)).length;
  return success / habits.length;
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent = `${calMonth.getFullYear()} / ${pad2(calMonth.getMonth()+1)}`;
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(d=>{
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
  const todayS = todayStr();

  for(let i=0;i<startWeekday;i++){
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(calMonth.getFullYear(), calMonth.getMonth(), day);
    const ds = dateStr(d);
    const el = document.createElement('div');
    el.className = 'cal-day';
    let rate = ds <= todayS ? monthCompletionRate(ds) : null;
    if(rate !== null){
      const alpha = 0.15 + rate * 0.75;
      el.style.background = `rgba(163,172,155,${alpha.toFixed(2)})`;
    }
    if(ds === todayS) el.style.border = '2px solid var(--dusk)';
    const mood = state.moods[ds];
    el.innerHTML = `<span class="num">${day}</span>${mood && mood.emoji ? `<span class="mood-emoji">${mood.emoji}</span>` : ''}`;
    grid.appendChild(el);
  }
}

    const title = document.createElement('div');
    title.className = 'habit-grid-title';
    title.innerHTML = `<span>${h.icon}</span><span>${h.name}</span>`;
    block.appendChild(title);
    const squares = document.createElement('div');
    squares.className = 'grid-squares';
    const days = [];
    for(let i=69;i>=0;i--) days.push(dateStr(addDays(new Date(),-i)));
    days.forEach(ds=>{
      const sq = document.createElement('div');
      sq.className = 'grid-square';
      if(ds <= todayS){
        if(isScheduledOnDate(h, ds)){
          sq.style.background = isDaySuccess(h,ds) ? 'var(--sage)' : 'var(--rose)';
        }
      }
      squares.appendChild(sq);
    });
    block.appendChild(squares);
    wrap.appendChild(block);
  });
}

function renderStatsPage(){
  renderCalendar();
  renderBestStreaks();
  renderHabitGrids();
}

// ---------- report page ----------
let reportPeriod = 'week';
document.querySelectorAll('.period-tabs button').forEach(btn=>{
  btn.onclick = () => {
    reportPeriod = btn.dataset.period;
    document.querySelectorAll('.period-tabs button').forEach(b=>b.classList.toggle('active', b===btn));
    renderReportPage();
  };
});

function periodRange(period){
  const today = new Date();
  if(period === 'week'){
    const start = mondayOfWeek(today);
    return {start, end: today};
  }
  if(period === 'month'){
    const start = new Date(today.getFullYear(), today.getMonth(), 1);
    return {start, end: today};
  }
  const start = new Date(today.getFullYear(), 0, 1);
  return {start, end: today};
}

function renderReportPage(){
  const {start, end} = periodRange(reportPeriod);
  const habits = activeHabits();
  let totalScheduled = 0, totalSuccess = 0;
  const rows = habits.map(h=>{
    let scheduled = 0, success = 0;
    let cursor = new Date(start);
    while(dateStr(cursor) <= dateStr(end)){
      const ds = dateStr(cursor);
      if(isScheduledOnDate(h, ds)){
        scheduled++;
        if(isDaySuccess(h, ds)) success++;
      }
      cursor = addDays(cursor, 1);
    }
    totalScheduled += scheduled; totalSuccess += success;
    const rate = scheduled > 0 ? success/scheduled : null;
    return {habit:h, rate, scheduled, success};
  });

  const overallRate = totalScheduled > 0 ? Math.round(totalSuccess/totalScheduled*100) : null;
  document.getElementById('reportRateBig').textContent = overallRate === null ? '--%' : `${overallRate}%`;
  const periodLabel = {week:'本週', month:'本月', year:'今年'}[reportPeriod];
  document.getElementById('reportRateLabel').textContent = `${periodLabel}整體打卡率`;

  const rankWrap = document.getElementById('reportRanking');
  rankWrap.innerHTML = '';
  rows.filter(r=>r.rate !== null).sort((a,b)=>a.rate-b.rate).forEach(r=>{
    const pct = Math.round(r.rate*100);
    const row = document.createElement('div');
    row.className = 'rank-row';
    row.innerHTML = `
      <span class="rank-name">${r.habit.icon} ${r.habit.name}</span>
      <span class="rank-rate ${pct<50?'low':pct>=80?'high':''}">${pct}%（${r.success}/${r.scheduled}）</span>
    `;
    rankWrap.appendChild(row);
  });
  if(rows.every(r=>r.rate===null)){
    rankWrap.innerHTML = '<div class="empty-hint">這段期間還沒有資料</div>';
  }
}

// ---------- modal helpers ----------
function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

// ---------- nav ----------
document.querySelectorAll('.bottom-nav button').forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active', b===btn));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+btn.dataset.page).classList.add('active');
    if(btn.dataset.page === 'stats') renderStatsPage();
    if(btn.dataset.page === 'report') renderReportPage();
  };
});

// ---------- init ----------
function renderAll(){
  renderDateLabel();
  renderMoodStrip();
  renderHabitList();
}
renderAll();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
